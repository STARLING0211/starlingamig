<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Starling Game</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
}

/* LOGO */
.logo {
  font-size: 60px;
  font-weight: bold;
  color: red;
  border: 3px solid red;
  width: 80px;
  height: 80px;
  margin: 20px auto;
  line-height: 80px;
  border-radius: 10px;
  box-shadow: 0 0 20px red;
}

/* TITULO */
h1 {
  margin-top: 10px;
}

/* BOTONES */
.btn {
  display: block;
  width: 240px;
  margin: 12px auto;
  padding: 14px;
  background: #222;
  color: white;
  text-decoration: none;
  border-radius: 10px;
  transition: 0.3s;
  font-size: 16px;
}

.btn:hover {
  background: red;
  transform: scale(1.05);
}
</style>

</head>

<body>

<div class="logo">X</div>

<h1>⭐ STARLING GAME</h1>
<p>Elige un juego</p>

</html>
